<!DOCTYPE html>
<html>
<head>
    <title>結果</title>
</head>
<body>
    <h1>処理結果</h1>

    <table border="1">
        <tr>
            <th>ファイル</th>
            <th>状態</th>
            <th>詳細</th>
        </tr>
        {% for r in results %}
        <tr>
            <td>{{r[0]}}</td>
            <td>{{r[1]}}</td>
            <td>{{r[2]}}</td>
        </tr>
        {% endfor %}
    </table>

    {% if excel %}
    <a href="/download?file={{excel}}">Excelダウンロード</a>
    {% endif %}

    <br><br>
    <a href=\"/\">戻る</a>
</body>
</html>
